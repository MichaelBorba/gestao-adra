<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADRA - Abrigo Bom Jesus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --verde: #007d5c; --bg: #f0f4f3; }
        body { background-color: var(--bg); font-family: sans-serif; height: 100vh; overflow: hidden; }
        .btn-card {
            background: #ffffff; border-radius: 24px;
            box-shadow: 6px 6px 12px #d1d9d7, -6px -6px 12px #ffffff;
            transition: all 0.2s; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 2px solid transparent;
        }
        .btn-card:active { transform: scale(0.97); border-color: var(--verde); }
        .tela { display: none; width: 100%; height: 100%; animation: fadeIn 0.3s ease-out; }
        .tela-ativa { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #fca5a5; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #86efac; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="max-w-[500px] mx-auto h-screen bg-[#f8faf9] shadow-2xl flex flex-col relative overflow-hidden">
    
    <header class="bg-[#007d5c] p-6 rounded-b-[50px] shadow-xl text-center z-10">
        <div class="bg-white inline-block p-2 rounded-2xl mb-2 shadow-md">
            <img src="https://static.wixstatic.com/media/2956c5_44bf991606b14fdd84cfcedcc8a19d83~mv2.png/v1/fill/w_1120,h_760,al_c/adra.png" class="h-10 object-contain">
        </div>
        <h1 class="text-white text-lg font-black uppercase">Abrigo Bom Jesus</h1>
        <div id="user-tag" class="hidden mt-2 text-[10px] bg-black/20 text-white py-1 px-4 rounded-full inline-flex items-center gap-2 border border-emerald-400">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
            <span id="nome-operador" class="font-bold text-emerald-300">---</span>
        </div>
    </header>

    <div id="modal-login" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-[340px] p-8 rounded-[40px] shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-emerald-900 text-center uppercase text-xs tracking-widest">Acesso</h3>
            <div class="space-y-4">
                <input type="text" id="login-u" placeholder="Usuário" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input type="password" id="login-p" placeholder="Senha" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <button onclick="realizarLogin()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold uppercase">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-preview" class="fixed inset-0 bg-black/90 z-[10000] hidden flex-col p-6">
        <div class="bg-white flex-1 rounded-[30px] p-6 overflow-y-auto">
            <h2 class="font-black text-emerald-900 mb-4 border-b pb-2 uppercase tracking-tighter">Resumo do Plantão</h2>
            <div id="preview-content" class="text-sm space-y-2 text-gray-700 whitespace-pre-wrap"></div>
        </div>
        <button onclick="fecharPreview()" class="mt-4 bg-white text-black py-4 rounded-2xl font-bold uppercase">Fechar Visualização</button>
    </div>

    <main class="flex-1 p-6 overflow-y-auto">
        <div id="tela-1" class="tela tela-ativa space-y-6">
            <button onclick="mudarTela(2)" class="btn-card w-full h-32">
                <span class="text-3xl mb-1">📋</span>
                <span class="font-bold text-emerald-900 uppercase">Iniciar/Editar Plantão</span>
            </button>
            <div id="area-admin" class="hidden grid grid-cols-2 gap-4">
                <button onclick="mudarTela('cad-user')" class="btn-card p-6 text-center"><span class="text-2xl">👤</span><span class="text-[9px] font-bold uppercase">Novo Usuário</span></button>
                <button onclick="mudarTela('cad-colab')" class="btn-card p-6 text-center"><span class="text-2xl">🤝</span><span class="text-[9px] font-bold uppercase">Novo Colaborador</span></button>
            </div>
        </div>

        <div id="tela-cad-user" class="tela space-y-4">
            <h2 class="text-center font-bold text-emerald-900 uppercase text-xs">Criar Login</h2>
            <input type="text" id="new-user-name" placeholder="Usuário" class="p-4 bg-white rounded-2xl w-full border outline-none">
            <input type="password" id="new-user-pass" placeholder="Senha" class="p-4 bg-white rounded-2xl w-full border outline-none">
            <select id="new-user-level" class="p-4 bg-white rounded-2xl w-full border outline-none">
                <option value="comum">Usuário Comum</option>
                <option value="admin">Administrador</option>
            </select>
            <button onclick="cadastrarNovoUsuario()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase">Salvar</button>
            <button onclick="mudarTela(1)" class="text-center text-gray-400 w-full text-xs uppercase">Voltar</button>
        </div>

        <div id="tela-cad-colab" class="tela space-y-4">
            <h2 class="text-center font-bold text-emerald-900 uppercase text-xs">Novo Colaborador</h2>
            <input type="text" id="new-colab-nome" placeholder="Nome" class="p-4 bg-white rounded-2xl w-full border outline-none">
            <input type="text" id="new-colab-cargo" placeholder="Cargo" class="p-4 bg-white rounded-2xl w-full border outline-none">
            <button onclick="cadastrarColaborador()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold uppercase">Salvar Equipe</button>
            <button onclick="mudarTela(1)" class="text-center text-gray-400 w-full text-xs uppercase">Voltar</button>
        </div>

        <div id="tela-2" class="tela space-y-4">
            <button onclick="setTurno('Diurno')" class="btn-card w-full py-8 text-xl font-bold uppercase">☀️ Diurno</button>
            <button onclick="setTurno('Noturno')" class="btn-card w-full py-8 text-xl font-bold uppercase">🌙 Noturno</button>
        </div>
        <div id="tela-3" class="tela space-y-4">
            <button onclick="setPosto('Plantão 1')" class="btn-card w-full py-6 text-lg font-bold uppercase">🏢 Plantão 1</button>
            <button onclick="setPosto('Plantão 2')" class="btn-card w-full py-6 text-lg font-bold uppercase">🏢 Plantão 2</button>
        </div>
        <div id="tela-4" class="tela">
            <div id="lista-presenca" class="space-y-3 flex-1 overflow-y-auto pb-4"></div>
            <button onclick="mudarTela(5)" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Escrever Ocorrências</button>
        </div>

        <div id="tela-5" class="tela">
            <div class="flex justify-between items-center mb-2 px-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase italic">Edição em tempo real...</span>
                <button onclick="abrirPreview()" class="text-[10px] bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold uppercase border border-emerald-200">👁️ Pré-Visualizar</button>
            </div>
            <textarea id="obs" class="flex-1 w-full p-6 rounded-[30px] bg-white border-2 border-emerald-50 outline-none mb-4 shadow-inner" placeholder="Descreva as ocorrências aqui..."></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="finalizarSistema('whatsapp')" class="bg-emerald-500 text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Finalizar no WhatsApp</button>
                <button id="btn-finalizar" onclick="finalizarSistema('email')" class="bg-black text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Finalizar por E-mail</button>
            </div>
        </div>
    </main>

    <footer class="p-4 flex justify-between items-center border-t bg-white">
        <button onclick="window.location.reload()" class="text-red-400 font-bold text-[10px] uppercase">Logout</button>
        <button onclick="mudarTela(1)" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-600 text-white shadow-lg -mt-8 border-4 border-[#f8faf9]">🏠</button>
        <div class="w-10"></div>
    </footer>
</div>

<script>
    const SUPABASE_URL = "https://vnanxhmfevppfzxuoqcx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuYW54aG1mZXZwcGZ6eHVvcWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTM3MzQsImV4cCI6MjA5MjU2OTczNH0.bxt7h9KvrO8H9iPMjinGQYclH9ONsmLgQLJ9e8073YE";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    emailjs.init("I9oSFhUe0oXhhSMRZ");

    let userAtivo = null;
    let dadosPlantao = { turno: '', posto: '', equipe: [] };

    function mudarTela(n) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('tela-ativa'));
        const target = document.getElementById(n.toString().includes('cad') ? 'tela-'+n : 'tela-'+n);
        if(target) target.classList.add('tela-ativa');
    }

    async function realizarLogin() {
        const u = document.getElementById('login-u').value;
        const p = document.getElementById('login-p').value;
        const { data } = await _supabase.from('perfis').select('*').eq('usuario', u).eq('senha', p).single();
        if (data) {
            userAtivo = data;
            document.getElementById('nome-operador').innerText = data.usuario.toUpperCase();
            document.getElementById('user-tag').classList.remove('hidden');
            document.getElementById('modal-login').style.display = 'none';
            if(data.nivel === 'admin') document.getElementById('area-admin').classList.remove('hidden');
            mudarTela(1);
        } else { alert("Acesso Negado."); }
    }

    // CRUD ADMIN
    async function cadastrarNovoUsuario() {
        const usuario = document.getElementById('new-user-name').value;
        const senha = document.getElementById('new-user-pass').value;
        const nivel = document.getElementById('new-user-level').value;
        const { error } = await _supabase.from('perfis').insert([{ usuario, senha, nivel }]);
        if(!error) { alert("Usuário criado!"); mudarTela(1); }
    }

    async function cadastrarColaborador() {
        const nome = document.getElementById('new-colab-nome').value;
        const cargo = document.getElementById('new-colab-cargo').value;
        const { error } = await _supabase.from('colaboradores').insert([{ nome, cargo }]);
        if(!error) { alert("Colaborador salvo!"); mudarTela(1); }
    }

    // FLUXO
    function setTurno(t) { dadosPlantao.turno = t; mudarTela(3); }
    async function setPosto(p) { 
        dadosPlantao.posto = p; mudarTela(4); 
        const { data } = await _supabase.from('colaboradores').select('*').order('nome');
        if(data) {
            dadosPlantao.equipe = data.map(c => ({ nome: c.nome, cargo: c.cargo || 'Func.', status: 'Presente' }));
            renderEquipe();
        }
    }

    function renderEquipe() {
        document.getElementById('lista-presenca').innerHTML = dadosPlantao.equipe.map((c, i) => `
            <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-emerald-50">
                <div><div class="font-bold text-sm text-emerald-900">${c.nome}</div><div class="text-[9px] text-gray-400 uppercase">${c.cargo}</div></div>
                <label class="switch"><input type="checkbox" ${c.status === 'Presente' ? 'checked' : ''} onchange="atualizarStatus(${i}, this.checked)"><span class="slider"></span></label>
            </div>`).join('');
    }

    function atualizarStatus(index, isChecked) {
        dadosPlantao.equipe[index].status = isChecked ? 'Presente' : 'Faltou';
    }

    function abrirPreview() {
        const obs = document.getElementById('obs').value;
        const lista = dadosPlantao.equipe.map(c => `${c.status === 'Presente' ? '✅' : '❌'} ${c.nome}`).join('\n');
        const resumo = `RESPONSÁVEL: ${userAtivo.usuario}\nUNIDADE: ${dadosPlantao.posto}\nTURNO: ${dadosPlantao.turno}\n\nEQUIPE:\n${lista}\n\nOCORRÊNCIAS:\n${obs || "Nenhuma alteração."}`;
        document.getElementById('preview-content').innerText = resumo;
        document.getElementById('modal-preview').classList.remove('hidden');
        document.getElementById('modal-preview').classList.add('flex');
    }

    function fecharPreview() {
        document.getElementById('modal-preview').classList.add('hidden');
    }

    async function finalizarSistema(metodo) {
        const obs = document.getElementById('obs').value;
        const listaTexto = dadosPlantao.equipe.map(c => `${c.status === 'Presente' ? '[✓]' : '[X]'} ${c.nome}`).join('\n');
        
        // 1. Salva no Banco (Supabase)
        const { error } = await _supabase.from('historico_plantao').insert([{
            operador: userAtivo.usuario, turno: dadosPlantao.turno, posto: dadosPlantao.posto, ocorrencias: obs, equipe_json: dadosPlantao.equipe
        }]);

        if(error) return alert("Erro ao salvar dados.");

        if(metodo === 'whatsapp') {
            const msg = window.encodeURIComponent(`*RELATÓRIO DE PLANTÃO - ADRA*\n\n*Responsável:* ${userAtivo.usuario}\n*Unidade:* ${dadosPlantao.posto}\n*Turno:* ${dadosPlantao.turno}\n\n*EQUIPE:*\n${listaTexto}\n\n*OCORRÊNCIAS:*\n${obs || "Sem alterações."}`);
            window.open(`https://api.whatsapp.com/send?text=${msg}`);
            window.location.reload();
        } else {
            // Envio por Email (EmailJS) com variáveis de segurança
            emailjs.send("service_gu3p4c9", "template_q5u8886", { 
                operador: userAtivo.usuario, 
                posto: dadosPlantao.posto, 
                turno: dadosPlantao.turno, 
                equipe: listaTexto, 
                ocorrencias: obs || "Sem alterações.",
                name: userAtivo.usuario, 
                title: "Relatório " + dadosPlantao.posto
            }).then(() => {
                alert("Sucesso! E-mail enviado.");
                gerarPDF(obs);
            }).catch((err) => {
                alert("E-mail falhou (Status: " + err.status + "). Dados salvos no banco. Tente pelo WhatsApp!");
            });
        }
    }

    function gerarPDF(obs) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("ADRA - RELATÓRIO DE PLANTÃO", 20, 20);
        doc.text(`Unidade: ${dadosPlantao.posto} | Resp: ${userAtivo.usuario}`, 20, 30);
        doc.text("Ocorrências:", 20, 50);
        doc.text(doc.splitTextToSize(obs || "Sem alterações.", 170), 20, 60);
        doc.save(`Plantao_${dadosPlantao.posto}.pdf`);
        window.location.reload();
    }
</script>
</body>
</html>
